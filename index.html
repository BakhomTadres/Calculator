<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="CSS/style.css" />
    <link rel="manifest" href="./manifest.json" />
    <link
      rel="shortcut icon"
      href="https://img.icons8.com/?size=100&id=HE27AKbr2E0d&format=png&color=000000"
      type="image/x-icon"
    />
  </head>
  <body>
    <div class="calculator">
      <input readonly />
      <div class="container">
        <div class="row">
          <button class="orange">C</button>
          <button>7</button>
          <button>4</button>
          <button>1</button>
          <button>0</button>
        </div>
        <div class="row">
          <button class="orange">DEL</button>
          <button>8</button>
          <button>5</button>
          <button>2</button>
          <button>.</button>
        </div>
        <div class="row">
          <button>/</button>
          <button>9</button>
          <button>6</button>
          <button>3</button>
          <button class="equal orange">=</button>
        </div>
        <div class="row">
          <button>*</button>
          <button>%</button>
          <button>+</button>
          <button>-</button>
        </div>
      </div>
    </div>
      <script src="script.js"></script>
  </body>
</html>
